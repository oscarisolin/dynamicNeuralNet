<!DOCTYPE html>
<html>
    <head>
        <!-- <script src="https://d3js.org/d3.v6.min.js"></script> -->
        <script src="./d3jsv6.js"></script>
        
    </head>
    <body>
        <svg></svg>
		<script>
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            const node_radius = 5;
            const link_width = 2;
            
            const svg = d3.select("svg")
            // center the graph in the svg. (0,0) is the center of the svg
            .attr("viewBox", [-width / 2, -height / 2, width, height])
            .attr("width", width)
            .attr("height", height)
            
            function intensity(d) {
                let begin = d3.color("steelblue");
                begin.opacity = 0.3;
                let end = d3.color("red");
                end.opacity = 0.7;
                let scale = d3.scaleLinear([0, 1], [begin, end]).clamp(true);
                
                if (typeof d.activity == 'undefined') {
                    return begin;
                }
                return scale(d.activity);
            }        
            
            function apply_drag(simulation) {
                
                function dragstarted(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    // Mark node as being dragged
                    d._isDragging = true;
                    // Store original fixed position (if any)
                    d._originalFx = d.fx;
                    d._originalFy = d.fy;
                    d.fx = d.x;
                    d.fy = d.y;
                }
                
                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }
                
                function dragended(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    // Mark node as no longer being dragged
                    d._isDragging = false;
                    // Restore original fixed position or free the node
                    d.fx = d._originalFx !== undefined ? d._originalFx : null;
                    d.fy = d._originalFy !== undefined ? d._originalFy : null;
                    // Clean up temporary storage
                    delete d._originalFx;
                    delete d._originalFy;
                    // Let the simulation settle
                    setTimeout(() => {
                        if (!simulation.alpha()) simulation.alpha(0.3).restart();
                    }, 0);
                }
                
                return d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended);
            }

            let link = svg.append("g").selectAll("line")	
                .attr("stroke-width", link_width);
                
            let node = svg.append("g").selectAll("circle");


            const simulation = d3.forceSimulation()        
                .force("repel", d3.forceManyBody().strength(-50))
                .force("collide", d3.forceCollide(node_radius * 3))
                .force("link", d3.forceLink().id(d => d.id).distance(80))
                .force("center mid x",d3.forceX().strength(0.05))
                .force("center mid y", d3.forceY().strength(0.05))
                .on("tick", ticked);
        
        
        
            function ticked() {
                node.attr("cx", d => d.x)
                .attr("cy", d => d.y)
                .style("fill",intensity)
                .attr("cnn_node_id",d=>d.id)
                .attr("cnn_activity",d => d.activity);
                
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y)
                    .attr("cnn_source_id",d => d.source.id)
                    .attr("cnn_target_id",d => d.target.id)
                    .attr("cnn_activity",d => d.activity)
                    .attr("stroke", intensity);
            }

            let previousNodeCount = 0;
            let previousLinkCount = 0;
            
            function graph_update(data){
                let structureChanged = (data.nodes.length !== previousNodeCount) || 
                                      (data.links.length !== previousLinkCount);
                
                previousNodeCount = data.nodes.length;
                previousLinkCount = data.links.length;

                // Set fixed positions for input/output nodes (only if not being dragged)
                let inputNodes = data.nodes.filter(d => d.input);
                let outputNodes = data.nodes.filter(d => d.output);
                
                inputNodes.forEach((d, i) => {
                    if (!d._isDragging) {
                        d.fx = -width*3/8;
                        d.fy = (i - (inputNodes.length - 1) / 2) * (height / (inputNodes.length + 2));
                    }
                });
                
                outputNodes.forEach((d, i) => {
                    if (!d._isDragging) {
                        d.fx = width*3/8;
                        d.fy = (i - (outputNodes.length - 1) / 2) * (height / (outputNodes.length + 2));
                    }
                });
                
                // Free other nodes (only if not being dragged)
                data.nodes.forEach(d => {
                    if (!d.input && !d.output && !d._isDragging) {
                        d.fx = null;
                        d.fy = null;
                    }
                });

                node = node
                    .data(data.nodes, d => d.id)
                    .join(enter => enter.append("circle")
                    .attr("r", node_radius));
                
                // Apply drag behavior to ALL nodes (both new and existing)
                node.call(apply_drag(simulation));

                    
                link = link
                    .data(data.links, d => [d.source, d.target])
                    .join("line");
                    
                simulation.nodes(data.nodes)
                .force("link").links(data.links);
                
                // Only restart simulation if structure changed (nodes/links added/removed)
                if (structureChanged) {
                    simulation.alpha(0.4).restart();
                } else {
                    // Just update the rendering without restarting physics
                    simulation.alpha(Math.max(simulation.alpha(), 0.01));
                }

                return "updated graph"
            }

  
        
        data = {"nodes": [{"id":1, "activity":70},{"id":2},{"id":3}], "links":[{"source":1,"target":2},{"source":2,"target":1, "activity":40}]}
        graph_update(data);

        var ws = new WebSocket("ws://localhost:5678");
        ws.onmessage = function (event) {
            var obj = JSON.parse(event.data);           
            // console.log(obj);
            
            let incomingNodes =  [];            
            let incomingLinks = [];
            
            if (obj.input) {
                data.nodes.forEach(existingNode => {
                    existingNode.input = false;
                    existingNode.output = false;
                });
                obj.input.forEach((k,i) => {              
                    data.nodes.forEach(existingNode => {
                        if (existingNode.id == k[1]) {
                            existingNode.activity = k[0]; 
                            existingNode.input = true;                            
                        }
                    });
                });
                obj.output.forEach((k,i) => {                    
                    data.nodes.forEach(existingNode => {
                        if (existingNode.id == k[1]) {
                            existingNode.activity = k[0]; 
                            existingNode.output = true;                            
                        }
                    });
                });
                
            }else{
                obj[0].forEach((k,i) => {
                    matcheed = false;
                    data.nodes.forEach(existingNode => {
                        if (existingNode.id == i) {
                            existingNode.activity = k;
                            incomingNodes.push(existingNode);                        
                            matcheed = true;
                        }
                    });
                    if (!matcheed) {
                        incomingNodes.push({
                            "id": i, 
                            "activity":k
                        });
                    }
                });
                
                data.nodes = incomingNodes;
                
                obj[1].forEach(k => {
                    matcheed = false;
                    data.links.forEach(existingLink => {
                        if (existingLink.source.id == k[0] && existingLink.target.id == k[1]) {
                            existingLink.activity = k[2];
                            if (!matcheed) {        
                                incomingLinks.push(existingLink);
                                matcheed = true;
                            }
                        }
                    });
                    if (!matcheed) {
                        incomingLinks.push({
                            "source": k[0], 
                            "target": k[1], 
                            "activity":k[2]
                        });
                    }
                });
    
                data.links = incomingLinks;
                
                // Remove nodes that have no connections (isolated nodes)
                let connectedNodeIds = new Set();
                data.links.forEach(link => {
                    connectedNodeIds.add(link.source.id !== undefined ? link.source.id : link.source);
                    connectedNodeIds.add(link.target.id !== undefined ? link.target.id : link.target);
                });
                
                // Keep only nodes that are connected via at least one link
                data.nodes = data.nodes.filter(node => connectedNodeIds.has(node.id));
                // console.log("mapped data",data);
            }
            

            graph_update(data);
        };
        
        </script>
    </body>
    </html>
